<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3ecf8e; --user-msg: #3b82f6; --bg: #0b0e11; --card: #15191c; --input: #22272b; --border: #2d3339; --text: #ffffff; }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --input: #f0f2f5; --border: #e4e6eb; --text: #1c1e21; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .screen { padding: 30px; display: none; flex-direction: column; gap: 15px; height: 100%; }
        .active { display: flex; }
        input { background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 8px; outline: none; }
        button { border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--primary); color: #000; }
        #output { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 85%; word-break: break-word; }
        .msg-me { align-self: flex-end; background: var(--user-msg); color: white; border-bottom-right-radius: 2px; }
        .msg-other { align-self: flex-start; background: var(--input); border-bottom-left-radius: 2px; }
        .msg-header { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 4px; opacity: 0.8; }
        .send-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen active">
        <h2>Login</h2>
        <input type="text" id="login-user" placeholder="Your Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="handleAuth('login')">Sign In</button>
        <button onclick="showScreen('signup-screen')" style="background:none; color:#888;">Create Account</button>
    </div>

    <div id="signup-screen" class="screen">
        <h2>Sign Up</h2>
        <input type="text" id="signup-user" placeholder="Choose Username">
        <input type="password" id="signup-pass" placeholder="Password">
        <button onclick="handleAuth('signup')">Register</button>
        <button onclick="showScreen('login-screen')" style="background:none; color:#888;">Back</button>
    </div>

    <div id="start-screen" class="screen">
        <h2>Private Chat</h2>
        <p style="color:#888; text-align:center;">Who do you want to chat with?</p>
        <input type="text" id="target-user" placeholder="Their Username">
        <button onclick="startPrivateChat()">Start Chatting</button>
        <button onclick="logout()" style="margin-top:20px; background:#ff4d4d; color:white;">Logout</button>
    </div>

    <div id="chat-screen" class="screen" style="padding:0; gap:0;">
        <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <b id="chat-with-label">Chat</b>
            <button onclick="showScreen('start-screen')" style="background:none; color:#888;">✕</button>
        </div>
        <div id="output"></div>
        <div class="send-area">
            <input type="text" id="msg" placeholder="Type a message..." style="flex:1">
            <button onclick="sendMsg()">➤</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://qlfdggzilndvtbyfqbdb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZmRnZ3ppbG5kdnRieWZxYmRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDUwOTgsImV4cCI6MjA4NzYyMTA5OH0.XlzFZSAimDc2SxEAwGn18wqEtDF3mqzYe6nW93OzZpU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myUser = "";
    let activeRoomId = "";

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function handleAuth(type) {
        const user = document.getElementById(`${type}-user`).value;
        const pass = document.getElementById(`${type}-pass`).value;
        const { error } = (type === 'login') 
            ? await _supabase.auth.signInWithPassword({ email: `${user}@chat.com`, password: pass })
            : await _supabase.auth.signUp({ email: `${user}@chat.com`, password: pass });
        if (error) alert(error.message); else checkUser();
    }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            myUser = user.email.split('@')[0];
            showScreen('start-screen');
        } else showScreen('login-screen');
    }

    function startPrivateChat() {
        const target = document.getElementById('target-user').value.trim();
        if (!target || target === myUser) return alert("Enter a valid username");
        
        // Sort names alphabetically so Room(A,B) is the same as Room(B,A)
        activeRoomId = [myUser, target].sort().join('_');
        document.getElementById('chat-with-label').innerText = "Chatting with: " + target;
        showScreen('chat-screen');
        loadMessages();
    }

    async function loadMessages() {
        if (!activeRoomId) return;
        const { data } = await _supabase.from('messages').select('*').eq('room_id', activeRoomId).order('created_at', { ascending: true });
        const output = document.getElementById('output');
        output.innerHTML = '';
        data.forEach(m => {
            const isMe = m.username === myUser;
            output.innerHTML += `<div class="msg ${isMe ? 'msg-me' : 'msg-other'}">
                <div class="msg-header"><b>${m.username}</b></div>
                ${m.content}
            </div>`;
        });
        output.scrollTop = output.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msg');
        if (!input.value.trim()) return;
        await _supabase.from('messages').insert([{ 
            content: input.value, 
            username: myUser, 
            room_id: activeRoomId 
        }]);
        input.value = '';
        loadMessages();
    }

    async function logout() { await _supabase.auth.signOut(); checkUser(); }
    document.getElementById('msg').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMsg(); });
    checkUser();
    setInterval(() => { if(activeRoomId) loadMessages() }, 3000);
</script>
</body>
</html>
