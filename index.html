<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon Messenger ++</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3ecf8e; --user-msg: #3b82f6; --bg: #0b0e11; --card: #1c2127; --input: #2d333b; --border: #444c56; --text: #adbac7; --header: #ffffff; }
        body.light-mode { --bg: #f6f8fa; --card: #ffffff; --input: #f6f8fa; --border: #d0d7de; --text: #24292f; --header: #1f2328; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; margin: 0; padding: 10px; overflow: hidden; }
        
        .container { width: 100%; max-width: 450px; background: var(--card); border-radius: 32px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        /* Persistent Flicker */
        @keyframes constant-flicker {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.7; filter: brightness(2) invert(0.3); }
        }
        .flicker-active { animation: constant-flicker 0.1s infinite; }

        /* Game Overlay */
        #game-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #game-canvas { background: #000; border: 2px solid var(--primary); border-radius: 10px; cursor: pointer; margin: 20px 0; }

        .screen { display: none; flex-direction: column; height: calc(100% - 65px); padding: 20px; }
        .active { display: flex; }

        input { background: var(--input); border: 1px solid var(--border); color: var(--header); padding: 16px; border-radius: 14px; outline: none; width: 100%; }
        button { border: none; padding: 16px; border-radius: 14px; font-weight: 600; cursor: pointer; background: var(--primary); color: #000; }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: #ff4d4d !important; color: white !important; }

        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 65px; background: var(--card); display: flex; border-top: 1px solid var(--border); z-index: 10; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; opacity: 0.5; font-weight: bold; }
        .nav-item.active-nav { opacity: 1; color: var(--primary); }

        #output { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px 0; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 85%; font-size: 15px; cursor: pointer; position: relative; }
        .msg-me { align-self: flex-end; background: var(--user-msg); color: white; border-bottom-right-radius: 4px; }
        .msg-other { align-self: flex-start; background: var(--input); color: var(--header); border-bottom-left-radius: 4px; }
        .msg-sys { align-self: center; font-size: 11px; opacity: 0.4; }

        #chat-settings-sheet, #admin-sheet { position: absolute; bottom: -100%; left: 0; width: 100%; height: auto; background: var(--card); border-radius: 30px 30px 0 0; border-top: 1px solid var(--border); z-index: 100; padding: 25px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 -10px 40px rgba(0,0,0,0.4); transition: bottom 0.3s ease; }
        .open { bottom: 0 !important; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="game-overlay">
        <h2 style="color: var(--primary);">SYSTEM HIJACKED</h2>
        <p>Complete Stereo Madness to Restore</p>
        <canvas id="game-canvas" width="300" height="150"></canvas>
        <p style="font-size: 12px; opacity: 0.7;">SPACE or TAP to Jump</p>
    </div>

    <div id="login-screen" class="screen active" style="justify-content:center; gap:15px;">
        <h1 style="text-align:center;">Pigeon Messenger ++</h1>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="handleAuth('login')">Sign In</button>
    </div>

    <div id="home-screen" class="screen">
        <h2>Pigeon Coop</h2>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="new-chat-user" placeholder="Target Pigeon...">
            <button onclick="startNewChat()" style="width:60px;">+</button>
        </div>
        <div id="chat-list" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="settings-screen" class="screen">
        <h2>Settings</h2>
        <button class="btn-ghost" onclick="toggleTheme()" style="width:100%; margin-bottom:10px;">🌓 Appearance</button>
        <button class="btn-ghost" onclick="openAdmin()" style="width:100%; margin-bottom:10px;">🛠️ Admin Console</button>
        <button class="btn-danger" onclick="logout()" style="margin-top:auto;">Sign Out</button>
    </div>

    <div id="chat-window" class="screen" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:50; background:var(--card);">
        <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom:15px; border-bottom:1px solid var(--border);">
            <button onclick="closeChatWindow()" style="background:none; color:var(--text); border:none; font-size:20px;">←</button>
            <b id="chat-title">Chat</b>
            <button onclick="toggleChatSettings()" style="background:none; color:var(--text); border:none; font-size:20px;">⚙️</button>
        </div>
        <div id="output"></div>
        <div style="display:flex; gap:8px; padding-top:10px;">
            <input type="text" id="msg" placeholder="Send a pigeon...">
            <button onclick="sendMsg()" style="width:50px;">➤</button>
        </div>
    </div>

    <div id="chat-settings-sheet">
        <button class="btn-danger" onclick="deleteCurrentChat()">🗑️ Wipe History</button>
        <button class="btn-ghost" onclick="toggleChatSettings()">Close</button>
    </div>

    <div id="admin-sheet">
        <input type="password" id="admin-pw" placeholder="Admin Key">
        <button class="btn-ghost" onclick="closeAdmin()">Close</button>
    </div>

    <div class="nav-bar" id="bottom-nav" style="display:none">
        <div class="nav-item active-nav" id="nav-home" onclick="navTo('home-screen')">PIGEONS</div>
        <div class="nav-item" id="nav-settings" onclick="navTo('settings-screen')">SETTINGS</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://qlfdggzilndvtbyfqbdb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZmRnZ3ppbG5kdnRieWZxYmRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDUwOTgsImV4cCI6MjA4NzYyMTA5OH0.XlzFZSAimDc2SxEAwGn18wqEtDF3mqzYe6nW93OzZpU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let myUser = "", activeRoom = "", chatInterval = null, lastProcessedMsgId = null, currentTriggerId = null;

    // --- MINI GAME ---
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    let gameReq, score = 0, player, spikes = [];

    function initGame() {
        score = 0; spikes = [];
        player = { x: 50, y: 120, w: 20, h: 20, vy: 0, jumped: false };
        if (gameReq) cancelAnimationFrame(gameReq);
        updateGame();
    }

    async function winGame() {
        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('main-container').classList.remove('flicker-active');
        cancelAnimationFrame(gameReq);
        if (currentTriggerId) {
            await _supabase.from('messages').delete().eq('id', currentTriggerId);
            currentTriggerId = null;
            loadMessages();
        }
    }

    function updateGame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        player.vy += 0.9; player.y += player.vy;
        if(player.y > 120) { player.y = 120; player.vy = 0; player.jumped = false; }
        ctx.fillStyle = "#3ecf8e"; ctx.fillRect(player.x, player.y, player.w, player.h);

        if(Math.random() < 0.02) spikes.push({ x: 300, y: 120 });
        spikes.forEach(s => {
            s.x -= 5;
            ctx.fillStyle = "#ff4d4d";
            ctx.beginPath(); ctx.moveTo(s.x, 140); ctx.lineTo(s.x+10, 120); ctx.lineTo(s.x+20, 140); ctx.fill();
            if(s.x < player.x + 20 && s.x + 20 > player.x && player.y + 18 > 118) initGame();
        });
        spikes = spikes.filter(s => s.x > -20);
        score++;
        if(score > 450) { winGame(); return; }
        gameReq = requestAnimationFrame(updateGame);
    }

    // --- CHAT ---
    async function handleAuth(type) {
        const user = document.getElementById(`login-user`).value.trim();
        const pass = document.getElementById(`login-pass`).value;
        const { error } = await _supabase.auth.signInWithPassword({email: user+'@chat.com', password: pass});
        if (error) alert(error.message); else checkUser();
    }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            myUser = user.email.split('@')[0];
            document.getElementById('bottom-nav').style.display = 'flex';
            navTo('home-screen');
        } else showScreen('login-screen');
    }

    async function loadMessages() {
        if(!activeRoom) return;
        const { data } = await _supabase.from('messages').select('*').eq('room_id', activeRoom).order('created_at', {ascending: true});
        const out = document.getElementById('output');
        
        data?.forEach(m => {
            if (m.content.trim().toLowerCase() === 'beepboopbeep' && m.id !== lastProcessedMsgId) {
                if (m.username !== myUser) {
                    currentTriggerId = m.id; lastProcessedMsgId = m.id;
                    document.getElementById('main-container').classList.add('flicker-active');
                    document.getElementById('game-overlay').style.display = 'flex';
                    initGame();
                }
            }
        });

        out.innerHTML = (data || []).map(m => `<div class="${m.username === 'System' ? 'msg-sys' : 'msg ' + (m.username === myUser ? 'msg-me' : 'msg-other')}" onclick="${m.username === myUser ? `deleteMessage('${m.id}')` : ''}">${m.content}</div>`).join('');
        out.scrollTop = out.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msg');
        if(!input.value.trim()) return;
        await _supabase.from('messages').insert([{ content: input.value, username: myUser, room_id: activeRoom }]);
        input.value = ''; loadMessages();
    }

    async function deleteMessage(id) {
        if(confirm("Delete message?")) { await _supabase.from('messages').delete().eq('id', id); loadMessages(); }
    }

    async function deleteCurrentChat() {
        if(confirm("Wipe all history?")) { await _supabase.from('messages').delete().eq('room_id', activeRoom); toggleChatSettings(); loadMessages(); }
    }

    function openChat(roomId, name) {
        activeRoom = roomId;
        document.getElementById('chat-title').innerText = name.replace(myUser, '').replace('_', '');
        document.getElementById('chat-window').classList.add('active');
        if(chatInterval) clearInterval(chatInterval);
        chatInterval = setInterval(loadMessages, 3000);
        loadMessages();
    }

    function closeChatWindow() {
        document.getElementById('chat-window').classList.remove('active');
        activeRoom = ""; clearInterval(chatInterval); loadChatHub();
    }

    async function loadChatHub() {
        const { data } = await _supabase.from('messages').select('room_id').neq('room_id', null);
        const list = [...new Set(data.map(d => d.room_id))].filter(r => r && r.includes(myUser));
        document.getElementById('chat-list').innerHTML = list.map(r => `<button class="btn-ghost" onclick="openChat('${r}', '${r}')" style="width:100%; margin-bottom:10px; text-align:left; padding:15px;">🐦 Pigeon: ${r.replace(myUser, '').replace('_', '')}</button>`).join('');
    }

    function navTo(id) {
        showScreen(id);
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('nav-' + id.split('-')[0]).classList.add('active-nav');
        if(id === 'home-screen') loadChatHub();
    }

    async function startNewChat() {
        const target = document.getElementById('new-chat-user').value.trim();
        if(!target || target === myUser) return;
        const roomId = [myUser, target].sort().join('_');
        await _supabase.from('messages').insert([{ content: 'Pigeon path established.', username: 'System', room_id: roomId }]);
        openChat(roomId, target);
    }

    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function toggleChatSettings() { document.getElementById('chat-settings-sheet').classList.toggle('open'); }
    function openAdmin() { document.getElementById('admin-sheet').classList.add('open'); }
    function closeAdmin() { document.getElementById('admin-sheet').classList.remove('open'); }
    async function logout() { await _supabase.auth.signOut(); checkUser(); }
    
    window.addEventListener('keydown', (e) => { if(e.code === 'Space' && !player.jumped) { player.vy = -12; player.jumped = true; } });
    canvas.addEventListener('mousedown', () => { if(!player.jumped) { player.vy = -12; player.jumped = true; } });
    document.getElementById('msg').addEventListener('keydown', e => e.key === 'Enter' && sendMsg());
    checkUser();
</script>
</body>
</html>
