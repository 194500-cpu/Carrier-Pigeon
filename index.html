<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pigeon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3ecf8e; --user-msg: #3b82f6; --bg: #0b0e11; --card: #15191c; --input: #22272b; --border: #2d3339; --text: #ffffff; }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --input: #f0f2f5; --border: #e4e6eb; --text: #1c1e21; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 450px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .screen { display: none; flex-direction: column; height: calc(100% - 60px); animation: fadeIn 0.2s; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 60px; background: var(--input); display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 0.7rem; opacity: 0.5; }
        .nav-item.active-nav { opacity: 1; color: var(--primary); }
        .list-item { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .user-profile { background: var(--input); padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); }
        #output { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; word-break: break-word; font-size: 0.95rem; }
        .msg-me { align-self: flex-end; background: var(--user-msg); color: white; border-bottom-right-radius: 2px; }
        .msg-other { align-self: flex-start; background: var(--input); border-bottom-left-radius: 2px; }
        input { background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; outline: none; }
        button { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--primary); color: #000; }
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .danger { background: #ff4d4d !important; color: white !important; }
        #ban-list-container { max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 5px; margin-top: 5px; }
        .ban-row { display: flex; justify-content: space-between; padding: 5px; font-size: 0.8rem; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen active" style="height: 100%; padding: 40px;">
        <h2 style="text-align:center">Secure Chat</h2>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="handleAuth('login')">Login</button>
        <button onclick="showScreen('signup-screen')" style="background:none; color:#888;">Create Account</button>
    </div>

    <div id="signup-screen" class="screen" style="height: 100%; padding: 40px;">
        <h2>Sign Up</h2>
        <input type="text" id="signup-user" placeholder="Username">
        <input type="password" id="signup-pass" placeholder="Password">
        <button onclick="handleAuth('signup')">Register</button>
        <button onclick="showScreen('login-screen')" style="background:none; color:#888;">Back</button>
    </div>

    <div id="home-screen" class="screen">
        <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; gap: 10px;">
            <input type="text" id="new-chat-user" placeholder="Find User..." style="flex:1">
            <button onclick="startNewChat()">+</button>
        </div>
        <div id="chat-list" style="overflow-y: auto; flex: 1;"></div>
    </div>

    <div id="settings-screen" class="screen" style="padding: 30px;">
        <div class="user-profile">
            <div style="font-size: 0.8rem; opacity: 0.6;">Account</div>
            <h3 id="settings-username-display">Username</h3>
        </div>
        <button onclick="toggleTheme()" style="background: var(--input); color:var(--text); margin-bottom: 10px;">🌓 Theme</button>
        <button onclick="openModal('admin-modal')" style="background: var(--input); color:var(--text); border: 1px solid var(--border);">🛠️ Admin Panel</button>
        <button onclick="logout()" class="danger" style="margin-top: auto;">Logout</button>
    </div>

    <div id="chat-window" class="screen" style="height: 100%; position: absolute; top: 0; left: 0; width: 100%; background: var(--card); z-index: 50;">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <button onclick="closeChatWindow()" style="background:none; color: var(--text)">←</button>
            <b id="chat-title">Chat</b>
            <button onclick="openModal('admin-modal')" style="background:none; opacity:0.5">⚙️</button>
        </div>
        <div id="output"></div>
        <div style="padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border);">
            <input type="text" id="msg" placeholder="Message..." style="flex:1">
            <button onclick="sendMsg()">➤</button>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div style="background: var(--card); padding: 20px; border-radius: 15px; width: 100%; display: flex; flex-direction: column; gap: 10px; border: 1px solid var(--border);">
            <h3 style="margin:0">Admin Control</h3>
            <input type="password" id="admin-pw" placeholder="Admin Password" oninput="refreshBanList()">
            
            <button onclick="adminAction('deleteRoom')" class="danger">Delete Room Messages</button>
            <hr style="width:100%; border:0; border-top:1px solid var(--border);">
            
            <input type="text" id="ban-target" placeholder="User to Ban">
            <button onclick="adminAction('banUser')" class="danger">Ban User</button>
            
            <p style="font-size:0.7rem; margin:5px 0 0 0; opacity:0.6;">Banned Users:</p>
            <div id="ban-list-container"></div>
            
            <button onclick="document.getElementById('admin-modal').style.display='none'" style="margin-top:5px; background:none; color:var(--text)">Close</button>
        </div>
    </div>

    <div class="nav-bar" id="bottom-nav" style="display:none">
        <div class="nav-item active-nav" id="nav-home" onclick="navTo('home-screen')"><span>💬</span>Chats</div>
        <div class="nav-item" id="nav-settings" onclick="navTo('settings-screen')"><span>⚙️</span>Settings</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://qlfdggzilndvtbyfqbdb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZmRnZ3ppbG5kdnRieWZxYmRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDUwOTgsImV4cCI6MjA4NzYyMTA5OH0.XlzFZSAimDc2SxEAwGn18wqEtDF3mqzYe6nW93OzZpU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myUser = "", activeRoom = "", chatInterval = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; refreshBanList(); }

    function navTo(screenId) {
        showScreen(screenId);
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('nav-' + screenId.split('-')[0]).classList.add('active-nav');
        if(screenId === 'home-screen') loadChatHub();
        if(screenId === 'settings-screen') document.getElementById('settings-username-display').innerText = myUser;
    }

    async function checkBanStatus(user) {
        const { data } = await _supabase.from('banned_users').select('username').eq('username', user).single();
        return !!data;
    }

    async function handleAuth(type) {
        const user = document.getElementById(`${type}-user`).value.trim();
        const pass = document.getElementById(`${type}-pass`).value;
        if(await checkBanStatus(user)) return alert("Banned.");
        const { error } = await (type === 'login' ? _supabase.auth.signInWithPassword({email: user+'@chat.com', password: pass}) : _supabase.auth.signUp({email: user+'@chat.com', password: pass}));
        if (error) alert(error.message); else checkUser();
    }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            myUser = user.email.split('@')[0];
            if(await checkBanStatus(myUser)) { await _supabase.auth.signOut(); return alert("Banned."); }
            document.getElementById('bottom-nav').style.display = 'flex';
            navTo('home-screen');
        } else {
            document.getElementById('bottom-nav').style.display = 'none';
            showScreen('login-screen');
        }
    }

    async function loadChatHub() {
        const { data } = await _supabase.from('messages').select('room_id').neq('room_id', null);
        const rooms = [...new Set(data.map(m => m.room_id))].filter(r => r.includes(myUser));
        const list = document.getElementById('chat-list');
        list.innerHTML = rooms.length ? '' : '<p style="text-align:center; opacity:0.4; margin-top:40px;">No active chats</p>';
        rooms.forEach(r => {
            const other = r.replace(myUser, '').replace('_', '');
            list.innerHTML += `<div class="list-item" onclick="openChat('${r}', '${other}')"><span>👤 ${other}</span><span>›</span></div>`;
        });
    }

    function startNewChat() {
        const target = document.getElementById('new-chat-user').value.trim();
        if(!target || target === myUser) return;
        openChat([myUser, target].sort().join('_'), target);
        document.getElementById('new-chat-user').value = '';
    }

    function openChat(roomId, name) {
        activeRoom = roomId;
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-window').classList.add('active');
        loadMessages();
        chatInterval = setInterval(loadMessages, 3000);
    }

    function closeChatWindow() {
        document.getElementById('chat-window').classList.remove('active');
        activeRoom = "";
        clearInterval(chatInterval);
        loadChatHub();
    }

    async function loadMessages() {
        if(!activeRoom) return;
        if(await checkBanStatus(myUser)) { await _supabase.auth.signOut(); location.reload(); }
        const { data } = await _supabase.from('messages').select('*').eq('room_id', activeRoom).order('created_at', {ascending: true});
        document.getElementById('output').innerHTML = data.map(m => `<div class="msg ${m.username === myUser ? 'msg-me' : 'msg-other'}">${m.content}</div>`).join('');
        document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msg');
        if(!input.value.trim()) return;
        await _supabase.from('messages').insert([{ content: input.value, username: myUser, room_id: activeRoom }]);
        input.value = ''; loadMessages();
    }

    async function refreshBanList() {
        const pw = document.getElementById('admin-pw').value;
        const { data: admin } = await _supabase.from('admin_keys').select('pass_key').eq('pass_key', pw).single();
        const container = document.getElementById('ban-list-container');
        if(!admin) return container.innerHTML = "<small style='opacity:0.5'>Enter password to see list</small>";
        
        const { data: bans } = await _supabase.from('banned_users').select('*');
        container.innerHTML = bans.map(b => `
            <div class="ban-row">
                <span>${b.username}</span>
                <button onclick="unbanUser('${b.username}')" style="padding:2px 8px; font-size:0.6rem;" class="danger">Unban</button>
            </div>
        `).join('');
    }

    async function unbanUser(user) {
        await _supabase.from('banned_users').delete().eq('username', user);
        refreshBanList();
    }

    async function adminAction(action) {
        const pw = document.getElementById('admin-pw').value;
        const { data } = await _supabase.from('admin_keys').select('pass_key').eq('pass_key', pw).single();
        if(!data) return alert("Unauthorized");

        if(action === 'deleteRoom') {
            if(!activeRoom) return alert("Open a chat first");
            await _supabase.from('messages').delete().eq('room_id', activeRoom);
            closeChatWindow();
        } else if (action === 'banUser') {
            const target = document.getElementById('ban-target').value.trim();
            if(!target) return alert("Name required");
            await _supabase.from('banned_users').insert([{ username: target }]);
            refreshBanList();
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    async function logout() { await _supabase.auth.signOut(); myUser = ""; checkUser(); }
    document.getElementById('msg').addEventListener('keydown', e => e.key === 'Enter' && sendMsg());
    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    checkUser();
</script>
</body>
</html>
