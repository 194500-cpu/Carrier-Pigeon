<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon Messenger ++</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3ecf8e; --user-msg: #3b82f6; --other-msg: #2d333b; --bg: #0b0e11; --card: #1c2127; --input: #2d333b; --border: #444c56; --text: #adbac7; --header: #ffffff; }
        body.light-mode { --bg: #f6f8fa; --card: #ffffff; --input: #f6f8fa; --border: #d0d7de; --text: #24292f; --header: #1f2328; --other-msg: #e1e4e8; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; margin: 0; padding: 10px; overflow: hidden; }
        
        .container { width: 100%; max-width: 450px; background: var(--card); border-radius: 32px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        @keyframes constant-flicker {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.8; filter: contrast(1.4) saturate(1.2); }
        }
        .flicker-active { animation: constant-flicker 0.1s infinite; }

        /* Game UI */
        #game-overlay { display: none; position: absolute; inset: 0; background: #1a1a1a; z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
        #game-canvas { border: 3px solid #555; background: #2c3e50; border-radius: 15px; }
        .stats-bar { width: 300px; display: flex; justify-content: space-between; color: white; font-weight: bold; margin-bottom: 10px; font-family: monospace; }

        /* Menu for Sender */
        #attack-menu { position: absolute; bottom: -100%; left: 0; width: 100%; background: #222; padding: 25px; border-top: 3px solid var(--primary); z-index: 150; transition: 0.4s; border-radius: 25px 25px 0 0; }
        #attack-menu.open { bottom: 0; }

        #settings-sheet { position: absolute; bottom: -100%; left: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); z-index: 100; padding: 25px; display: flex; flex-direction: column; gap: 15px; transition: 0.3s; border-radius: 25px 25px 0 0; }
        .sheet-open { bottom: 0 !important; }

        .screen { display: none; flex-direction: column; height: calc(100% - 65px); padding: 20px; }
        .active { display: flex; }

        input { background: var(--input); border: 1px solid var(--border); color: var(--header); padding: 16px; border-radius: 14px; outline: none; width: 100%; }
        button { border: none; padding: 16px; border-radius: 14px; font-weight: 600; cursor: pointer; background: var(--primary); color: #000; }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: #ff4d4d !important; color: white !important; }

        #output { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px 0; }
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 80%; font-size: 15px; display: flex; flex-direction: column; cursor: pointer; }
        .msg-time { font-size: 9px; opacity: 0.5; margin-top: 4px; }
        .msg-me { align-self: flex-end; background: var(--user-msg); color: white; border-bottom-right-radius: 4px; align-items: flex-end; }
        .msg-other { align-self: flex-start; background: var(--other-msg); color: var(--header); border-bottom-left-radius: 4px; align-items: flex-start; }

        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 65px; background: var(--card); display: flex; border-top: 1px solid var(--border); z-index: 10; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; font-weight: bold; opacity: 0.5; }
        .active-nav { opacity: 1; color: var(--primary); }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="game-overlay">
        <div class="stats-bar">
            <span style="color: #3498db;">HP: <span id="p-hp">100</span></span>
            <span style="color: #e74c3c;">BOSS: <span id="e-hp">100</span></span>
        </div>
        <canvas id="game-canvas" width="320" height="400"></canvas>
    </div>

    <div id="attack-menu">
        <h3 style="color: white; margin-top: 0;">VIRUS OPTIONS</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="executeAttack('Trojan')">Trojan</button>
            <button onclick="executeAttack('Brawl')" style="background: #e67e22;">Brawl</button>
            <button onclick="executeAttack('Hijack')" style="background: #9b59b6;">Hijack</button>
            <button onclick="cancelAttack()" class="btn-ghost" style="color:white;">Cancel</button>
        </div>
    </div>

    <div id="login-screen" class="screen active" style="justify-content:center; gap:15px;">
        <h1 style="text-align:center;">Pigeon ++</h1>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="handleAuth()">Sign In</button>
    </div>

    <div id="home-screen" class="screen">
        <h2>Pigeon Coop</h2>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="new-chat-user" placeholder="Target Pigeon...">
            <button onclick="startNewChat()" style="width:60px;">+</button>
        </div>
        <div id="chat-list" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="settings-screen" class="screen">
        <h2>Settings</h2>
        <button class="btn-ghost" onclick="toggleTheme()" style="width:100%; margin-bottom:10px;">🌓 Appearance</button>
        <button class="btn-danger" onclick="logout()" style="margin-top:auto;">Sign Out</button>
    </div>

    <div id="chat-window" class="screen" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:50; background:var(--card);">
        <div style="display:flex; align-items:center; justify-content:space-between; padding-bottom:15px; border-bottom:1px solid var(--border);">
            <div style="display:flex; align-items:center;">
                <button onclick="closeChatWindow()" style="background:none; color:var(--text); border:none; font-size:20px;">←</button>
                <b id="chat-title" style="margin-left:15px;">Chat</b>
            </div>
            <button onclick="toggleSettingsSheet()" style="background:none; border:none; font-size:20px;">⚙️</button>
        </div>
        <div id="output"></div>
        <div style="display:flex; gap:8px; padding-top:10px;">
            <input type="text" id="msg" placeholder="Send a pigeon...">
            <button onclick="checkInputAndSend()" style="width:50px;">➤</button>
        </div>
    </div>

    <div id="settings-sheet">
        <button class="btn-danger" onclick="deleteHistory()">🗑️ Wipe Chat History</button>
        <button class="btn-ghost" onclick="toggleSettingsSheet()" style="color:var(--text)">Close</button>
    </div>

    <div class="nav-bar" id="bottom-nav" style="display:none">
        <div class="nav-item active-nav" id="nav-home" onclick="navTo('home-screen')">PIGEONS</div>
        <div class="nav-item" id="nav-settings" onclick="navTo('settings-screen')">SETTINGS</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://qlfdggzilndvtbyfqbdb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZmRnZ3ppbG5kdnRieWZxYmRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDUwOTgsImV4cCI6MjA4NzYyMTA5OH0.XlzFZSAimDc2SxEAwGn18wqEtDF3mqzYe6nW93OzZpU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let myUser = "", activeRoom = "", chatInterval = null, lastProcessedMsgId = null, currentTriggerId = null;

    // --- GAME ENGINE ---
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    let gameReq, player, enemy, bullets = [], enemyBullets = [], keys = {};

    function initBrawl() {
        player = { x: 160, y: 350, hp: 100 };
        enemy = { x: 160, y: 50, hp: 100, vx: 2.5 };
        bullets = []; enemyBullets = [];
        if (gameReq) cancelAnimationFrame(gameReq);
        updateBrawl();
    }

    function updateBrawl() {
        ctx.clearRect(0, 0, 320, 400);
        if (keys['ArrowLeft'] || keys['a']) player.x = Math.max(15, player.x - 4);
        if (keys['ArrowRight'] || keys['d']) player.x = Math.min(305, player.x + 4);
        if (keys['ArrowUp'] || keys['w']) player.y = Math.max(200, player.y - 4);
        if (keys['ArrowDown'] || keys['s']) player.y = Math.min(385, player.y + 4);

        enemy.x += enemy.vx;
        if (enemy.x > 300 || enemy.x < 20) enemy.vx *= -1;
        if (Math.random() < 0.04) enemyBullets.push({ x: enemy.x, y: enemy.y, vy: 5 });

        ctx.fillStyle = '#3498db'; ctx.beginPath(); ctx.arc(player.x, player.y, 15, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(enemy.x, enemy.y, 15, 0, Math.PI*2); ctx.fill();

        bullets.forEach((b, i) => {
            b.y -= 8; ctx.fillStyle = "yellow"; ctx.fillRect(b.x-2, b.y, 4, 12);
            if (Math.hypot(b.x - enemy.x, b.y - enemy.y) < 20) { enemy.hp -= 4; bullets.splice(i, 1); }
        });
        enemyBullets.forEach((b, i) => {
            b.y += 5; ctx.fillStyle = "orange"; ctx.fillRect(b.x-2, b.y, 4, 10);
            if (Math.hypot(b.x - player.x, b.y - player.y) < 18) { player.hp -= 8; enemyBullets.splice(i, 1); }
        });

        document.getElementById('p-hp').innerText = player.hp;
        document.getElementById('e-hp').innerText = enemy.hp;

        if (player.hp <= 0) initBrawl();
        if (enemy.hp <= 0) winBrawl();
        else gameReq = requestAnimationFrame(updateBrawl);
    }

    async function winBrawl() {
        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('main-container').classList.remove('flicker-active');
        cancelAnimationFrame(gameReq);
        if (currentTriggerId) {
            await _supabase.from('messages').delete().eq('id', currentTriggerId);
            currentTriggerId = null; loadMessages();
        }
    }

    // --- CORE APP ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function handleAuth() {
        const user = document.getElementById('login-user').value.trim();
        const pass = document.getElementById('login-pass').value;
        const { error } = await _supabase.auth.signInWithPassword({ email: user + '@chat.com', password: pass });
        if (error) alert(error.message); else checkUser();
    }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            myUser = user.email.split('@')[0];
            document.getElementById('bottom-nav').style.display = 'flex';
            navTo('home-screen');
        }
    }

    function checkInputAndSend() {
        const val = document.getElementById('msg').value.trim().toLowerCase();
        if (val === 'beepboopbeep') document.getElementById('attack-menu').classList.add('open');
        else sendMsg();
    }

    async function executeAttack(type) {
        document.getElementById('attack-menu').classList.remove('open');
        await _supabase.from('messages').insert([{ content: 'beepboopbeep', username: myUser, room_id: activeRoom }]);
        document.getElementById('msg').value = ''; loadMessages();
    }

    function cancelAttack() { document.getElementById('attack-menu').classList.remove('open'); }

    async function loadMessages() {
        if (!activeRoom) return;
        const { data } = await _supabase.from('messages').select('*').eq('room_id', activeRoom).order('created_at', { ascending: true });
        const out = document.getElementById('output');
        let html = "";
        data?.forEach(m => {
            const isMe = m.username === myUser;
            const isTrigger = m.content.trim().toLowerCase() === 'beepboopbeep';

            if (isTrigger && m.id !== lastProcessedMsgId && !isMe) {
                currentTriggerId = m.id; lastProcessedMsgId = m.id;
                document.getElementById('main-container').classList.add('flicker-active');
                document.getElementById('game-overlay').style.display = 'flex';
                initBrawl();
            }

            if (!isTrigger) {
                const d = new Date(m.created_at);
                const time = `${d.toLocaleDateString([], {month:'short', day:'numeric'})}, ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
                html += `<div class="msg ${isMe ? 'msg-me' : 'msg-other'}" onclick="${isMe ? `deleteMsg('${m.id}')` : ''}">${m.content}<span class="msg-time">${time}</span></div>`;
            }
        });
        out.innerHTML = html; out.scrollTop = out.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msg');
        if (!input.value.trim()) return;
        await _supabase.from('messages').insert([{ content: input.value, username: myUser, room_id: activeRoom }]);
        input.value = ''; loadMessages();
    }

    async function deleteMsg(id) { if(confirm("Delete message?")) { await _supabase.from('messages').delete().eq('id', id); loadMessages(); } }
    async function deleteHistory() { if(confirm("Wipe all history?")) { await _supabase.from('messages').delete().eq('room_id', activeRoom); toggleSettingsSheet(); loadMessages(); } }

    function openChat(roomId, name) {
        activeRoom = roomId;
        document.getElementById('chat-title').innerText = name.replace(myUser, '').replace('_', '');
        showScreen('chat-window');
        if (chatInterval) clearInterval(chatInterval);
        chatInterval = setInterval(loadMessages, 3000);
        loadMessages();
    }

    function closeChatWindow() { showScreen('home-screen'); activeRoom = ""; clearInterval(chatInterval); loadChatHub(); }

    async function loadChatHub() {
        const { data } = await _supabase.from('messages').select('room_id').neq('room_id', null);
        const list = [...new Set(data.map(d => d.room_id))].filter(r => r && r.includes(myUser));
        document.getElementById('chat-list').innerHTML = list.map(r => `<button class="btn-ghost" onclick="openChat('${r}', '${r}')" style="width:100%; margin-bottom:10px; text-align:left; color:var(--text);">🐦 Pigeon: ${r.replace(myUser, '').replace('_', '')}</button>`).join('');
    }

    function navTo(id) {
        showScreen(id);
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        const navBtn = document.getElementById('nav-' + id.split('-')[0]);
        if(navBtn) navBtn.classList.add('active-nav');
        if (id === 'home-screen') loadChatHub();
    }

    async function startNewChat() {
        const t = document.getElementById('new-chat-user').value.trim();
        if (!t || t === myUser) return;
        const rid = [myUser, t].sort().join('_');
        await _supabase.from('messages').insert([{ content: 'Coop Joined.', username: 'System', room_id: rid }]);
        openChat(rid, t);
    }

    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function toggleSettingsSheet() { document.getElementById('settings-sheet').classList.toggle('sheet-open'); }
    async function logout() { await _supabase.auth.signOut(); location.reload(); }

    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);
    canvas.addEventListener('mousedown', () => bullets.push({ x: player.x, y: player.y }));
    document.getElementById('msg').addEventListener('keydown', e => e.key === 'Enter' && checkInputAndSend());
    
    checkUser();
</script>
</body>
</html>
